services:
# Un-comment and run this service to run this project in Docker (as done in the prod). 
# Prerequisites are: 
# 1. Creating a docker image called "dau:test" from the Dockerfile of this Project.
# 2. A "env.docker" file should be present before running this service. This file can be
#    created from the existing "env.dev" file. The only difference between the two is that
#    the newly created "env.docker" file will not have export keyword for all the variables. 
  # app:
  #     image: dau:test
  #     ports:
  #       - 4000:4000
  #     environment:
  #       PHX_SERVER: "true"
  #       DATABASE_USER: tattle
  #       DATABASE_PASSWORD: weak_password
  #       DATABASE_NAME: dau_dev
  #       # queue is the service name. As everything is happening inside the docker compose, the service name
  #       # is used instead of localhost.
  #       RABBITMQ_URL: amqp://admin:Admin123@queue  
  #     depends_on:
  #       - db
  #       - queue
  #     env_file:
  #      - env.docker
  db:
    image: postgres:14.10
    restart: always
    environment:
      - POSTGRES_USER=tattle
      - POSTGRES_PASSWORD=weak_password
      - POSTGRES_DB=dau_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 1s
      timeout: 5s
      retries: 10
    volumes:
      - ~/data/dau/postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432

  db_gui:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  queue:
    image: rabbitmq@sha256:e2505f78d58dca8c372cde3930e4d6bee5e02ac9001ce85ece5a11df606c1fa3 # rabbitmq:3.12.12-management
    container_name: rabbitmq
    hostname: rabbitmq
    volumes:
      - ./.docker/rabbitmq/data:/var/lib/rabbitmq
      - ./.docker/rabbitmq/logs:/var/log/rabbitmq
    environment:
      RABBITMQ_ERLANG_COOKIE: "secret-cookie"
      RABBITMQ_DEFAULT_USER: "admin"
      RABBITMQ_DEFAULT_PASS: "Admin123"
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15672"]
      interval: 30s
      timeout: 10s
      retries: 5

  hash_worker:
    image: tattletech/feluda-operator-hash:worker-amd64-latest
    container_name: hash_worker
    depends_on:
      - queue
    environment:
      MQ_USERNAME: admin
      MQ_PASSWORD: Admin123
      MQ_HOST: rabbitmq
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID_HASH_WORKER}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY_HASH_WORKER}
      AWS_BUCKET: ${AWS_BUCKET_HASH_WORKER}
      AWS_REGION: ${AWS_REGION_HASH_WORKER}
    command:
      - /bin/sh
      - -c
      - |
        echo "sleep for 10sec"
        sleep 10 
        python -m worker.hash.hash_worker
